name: release version

on:
  push:
    branches:
      - main
  # Allows the daily Trivy scan in security-scan.yml to re-trigger a build
  # against a freshly patched Wolfi base when OS-package CVEs are detected.
  workflow_dispatch:

env:
  # Version 26.5.7
  VERSION_MAJOR: 26
  VERSION_SUBMAJOR: 5
  VERSION_MINOR: 7

jobs:
  release-public:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}
      - name: Version
        run: |
          TS=$(date +%s)
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
          echo "VERSION_SUBMAJOR=$VERSION_SUBMAJOR" >> $GITHUB_ENV
          echo "VERSION_MINOR=$VERSION_MINOR" >> $GITHUB_ENV
          echo "VERSION_TS=$TS" >> $GITHUB_ENV
          echo "VERSION_TAG=$VERSION_MAJOR.$VERSION_SUBMAJOR.$VERSION_MINOR.$TS" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/phasetwo/phasetwo-keycloak:latest
            quay.io/phasetwo/phasetwo-keycloak:${{ env.VERSION_MAJOR }}
            quay.io/phasetwo/phasetwo-keycloak:${{ env.VERSION_MAJOR }}.${{ env.VERSION_SUBMAJOR }}
            quay.io/phasetwo/phasetwo-keycloak:${{ env.VERSION_MAJOR }}.${{ env.VERSION_SUBMAJOR }}.${{ env.VERSION_MINOR }}
            quay.io/phasetwo/phasetwo-keycloak:${{ env.VERSION_MAJOR }}.${{ env.VERSION_SUBMAJOR }}.${{ env.VERSION_MINOR }}.${{ env.VERSION_TS }}
      - name: Build cluster distribution and push to quay
        uses: docker/build-push-action@v7
        with:
          context: "cluster/"
          file: "cluster/Dockerfile"
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: |
            quay.io/phasetwo/phasetwo-cluster:latest
            quay.io/phasetwo/phasetwo-cluster:${{ env.VERSION_MAJOR }}
            quay.io/phasetwo/phasetwo-cluster:${{ env.VERSION_MAJOR }}.${{ env.VERSION_SUBMAJOR }}
            quay.io/phasetwo/phasetwo-cluster:${{ env.VERSION_MAJOR }}.${{ env.VERSION_SUBMAJOR }}.${{ env.VERSION_MINOR }}
            quay.io/phasetwo/phasetwo-cluster:${{ env.VERSION_MAJOR }}.${{ env.VERSION_SUBMAJOR }}.${{ env.VERSION_MINOR }}.${{ env.VERSION_TS }}
      - name: Tag
        uses: cardinalby/git-tag-action@master
        env:
          TAG: v${{ env.VERSION_TAG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-release Trivy scan against the just-pushed image. This is a
      # record of what shipped — non-gating (the image is already public)
      # but the SARIF/JSON artifacts let us diff today's release against
      # yesterday's daily scan. OpenVEX is applied so documented false
      # positives don't pollute the report.
      - name: Trivy — post-push scan (SARIF for GitHub Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          # The action wrapper has no `vex` input; the Trivy CLI reads
          # TRIVY_VEX as the env-var equivalent of `--vex`.
          TRIVY_VEX: openvex.json
        with:
          image-ref: quay.io/phasetwo/phasetwo-keycloak:${{ env.VERSION_TAG }}
          format: sarif
          output: trivy-release.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '0'

      - name: Trivy — post-push scan (JSON for downstream tooling)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_VEX: openvex.json
        with:
          image-ref: quay.io/phasetwo/phasetwo-keycloak:${{ env.VERSION_TAG }}
          format: json
          output: trivy-release.json
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: '0'

      - name: Upload Trivy release report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trivy-release-${{ env.VERSION_TAG }}
          path: |
            trivy-release.sarif
            trivy-release.json
          retention-days: 90
