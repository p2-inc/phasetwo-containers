version: '3'

volumes:
  cockroach_data:
    driver: local
  caddy_data:
    driver: local

services:
  cockroach:
    image: cockroachdb/cockroach:v23.2.23
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    command: start-single-node --insecure
    ports:
      - 26257:26257
  keycloak:
    build:
      context: .
      args:
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
      # Override `host-m2` to expose a host Maven repository to the libs
      # build stage (see Dockerfile). Default is an empty scratch image, so
      # CI builds behave the same as `FROM scratch AS host-m2` in the
      # Dockerfile. To pull in locally-installed SNAPSHOTs, set HOST_M2 to a
      # directory whose layout mirrors ~/.m2 (contains `repository/`):
      #   HOST_M2=$HOME/.m2 docker compose build keycloak
      # Note: BuildKit transfers the entire HOST_M2 directory before
      # running the build, so for large repos prefer staging a small subset
      # (e.g. just io/phasetwo/).
      additional_contexts:
        - "host-m2=${HOST_M2:-docker-image://scratch}"
    environment:
      KC_DB: cockroach
      KC_HTTP_RELATIVE_PATH: /auth
      PROXY_ADDRESS_FORWARDING: 'true'
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_CACHE_CONFIG_FILE: cache-ispn-jdbc-ping.xml
      KC_DB_PASSWORD: ''
      KC_DB_SCHEMA: public
      KC_DB_URL_DATABASE: defaultdb
      KC_DB_URL_HOST: cockroach
      KC_DB_URL_PORT: 26257
      KC_DB_URL_PROPERTIES: '?sslmode=disable&useCockroachMetadata=true'
      KC_DB_USERNAME: root
      KC_FEATURES: persistent-user-sessions
      KC_FEATURES_DISABLED: organization
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_MANAGEMENT_PORT: 9000
      KC_ISPN_DB_VENDOR: cockroachdb
      KC_LOG_LEVEL: "INFO,io.phasetwo:DEBUG,org.keycloak.connections.infinispan.DefaultInfinispanConnectionProviderFactory:DEBUG,fi.metatavu.keycloak.scim.server:DEBUG"
      KC_METRICS_ENABLED: true
      KC_PROXY_HEADERS: 'xforwarded'
      KC_SPI_EVENTS_STORE_PROVIDER: ext-event-mdc-logger-store
      KC_SPI_EVENTS_STORE_EXT_EVENT_MDC_LOGGER_STORE_USE_JPA: 'true'
      KC_TRANSACTION_JTA_ENABLED: 'false'
      KC_TRANSACTION_XA_ENABLED: 'false'
    ports:
      - 9000:9000
      - 8080:8080
      - 8443:8443
    depends_on:
      - cockroach
    entrypoint: /opt/keycloak/bin/kc.sh --verbose start --spi-email-template-provider=freemarker-plus-mustache --spi-email-template-freemarker-plus-mustache-enabled=true --spi-theme-cache-themes=false
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    command: caddy reverse-proxy --from ${CADDY_FROM:-:80} --to http://keycloak:8080
    # Caddy is opt-in via `docker compose --profile public-proxy up` so that
    # the default local-test stack does not try to issue a public TLS cert.
    profiles:
      - public-proxy
    ports:
      - 80:80
      - 443:443
    volumes:
      - caddy_data:/data
    depends_on:
      - keycloak
